<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${currentCategory != null ? currentCategory.name : 'Kategori'}">Kategori</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f2f5; }
        .navbar-custom { background: #001529; padding: 12px 0; }
        .navbar-brand { font-weight: 900; font-size: 1.8rem; color: white !important; letter-spacing: -1px; }
        .navbar-brand span { color: #e63946; }
        .nav-link-custom { color: #ccc !important; font-size: 0.9rem; transition: color 0.2s; }
        .nav-link-custom:hover { color: white !important; }
        .section-title { font-weight: 800; font-size: 1.4rem; color: #2c3e50; border-left: 4px solid #e63946; padding-left: 12px; margin-bottom: 20px; }
        .news-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; height: 100%; display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .news-card img { width: 100%; height: 180px; object-fit: cover; }
        .news-card .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
        .news-card .card-title { font-size: 1rem; font-weight: 700; color: #2c3e50; }
        .news-card .card-text { font-size: 0.85rem; color: #666; flex: 1; }
        .news-card .meta { font-size: 0.75rem; color: #999; margin-top: 8px; }
        .cat-badge { background: #e63946; color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; margin-right: 4px; }
        .tag-badge { background: #e8f4fd; color: #1890ff; padding: 3px 8px; border-radius: 20px; font-size: 0.75rem; margin-right: 4px; }
        footer { background: #001529; color: #aaa; padding: 32px 0; margin-top: 60px; font-size: 0.9rem; }
        footer a { color: #aaa; text-decoration: none; }
        footer a:hover { color: white; }
    </style>
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/">News<span>CMS</span></a>
        <div class="d-flex align-items-center gap-3">
            <a th:each="cat : ${categories}" 
               th:href="@{/kategori/{slug}(slug=${cat.slug})}" 
               th:text="${cat.name}" 
               class="nav-link-custom"></a>
            <form th:action="@{/search}" method="get" class="d-flex me-2">
                <input type="text" name="q" placeholder="Haber ara..."
                       class="form-control form-control-sm me-2" style="width:200px;">
                <button type="submit" class="btn btn-sm btn-danger">Ara</button>
            </form>
            <sec:authorize access="isAuthenticated()">
                <a class="btn btn-sm btn-outline-light" th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')">Admin</a>
                <a class="btn btn-sm btn-danger" th:href="@{/logout}">Çıkış</a>
            </sec:authorize>
            <sec:authorize access="isAnonymous()">
                <a class="btn btn-sm btn-outline-light" th:href="@{/login}">Giriş</a>
            </sec:authorize>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="section-title" th:text="${currentCategory != null ? currentCategory.name + ' Haberleri' : 'Haberler'}">Kategori Haberleri</div>

    <div th:if="${newsList != null && !newsList.isEmpty()}" class="row g-4">
        <div th:each="n : ${newsList}" class="col-md-4">
            <div class="news-card">
                <img th:if="${n.imageUrl != null && !#strings.isEmpty(n.imageUrl)}"
                     th:src="${n.imageUrl}" alt="Haber"
                     onerror="this.src='https://via.placeholder.com/400x180?text=Gorsel+Yok'">
                <img th:unless="${n.imageUrl != null && !#strings.isEmpty(n.imageUrl)}"
                     src="https://via.placeholder.com/400x180?text=Gorsel+Yok" alt="Varsayılan">
                <div class="card-body">
                    <div class="mb-1">
                        <span class="cat-badge" th:if="${n.category != null}" th:text="${n.category.name}"></span>
                        <span th:each="tag : ${n.tags}" class="tag-badge" th:text="${tag.name}"></span>
                    </div>
                    <div class="card-title mt-1" th:text="${n.title}"></div>
                    <div class="card-text" th:text="${#strings.abbreviate(n.content, 100)}"></div>
                    <div class="meta">
                        ✍️ <span th:text="${n.author != null ? n.author : 'Anonim'}"></span> ·
                        🕐 <span th:text="${n.createdAt != null ? n.createdAt.toString().substring(0,10) : ''}"></span>
                    </div>
                    <a th:href="@{/news/{id}(id=${n.id})}" class="btn btn-sm btn-outline-danger mt-3">Haberi Oku →</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${newsList == null || newsList.isEmpty()}" class="text-center py-5 text-muted">
        <h4>Bu kategoride henüz haber yok.</h4>
        <a href="/" class="btn btn-danger mt-3">Ana Sayfaya Dön</a>
    </div>

    <!-- PAGİNATİON -->
    <div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-4">
        <nav>
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/kategori/{slug}(slug=${currentCategory.slug}, page=${currentPage - 1})}">← Önceki</a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    class="page-item" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/kategori/{slug}(slug=${currentCategory.slug}, page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/kategori/{slug}(slug=${currentCategory.slug}, page=${currentPage + 1})}">Sonraki →</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<footer>
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <strong style="color:white;">NewsCMS</strong><br>
            <small>© 2026 Tüm hakları saklıdır.</small>
        </div>
        <div class="d-flex gap-3">
            <a href="/">Ana Sayfa</a>
            <a th:href="@{/login}">Giriş</a>
        </div>
    </div>
</footer>

</body>
</html>
