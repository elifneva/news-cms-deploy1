<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kategori Ekle</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width:500px;">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Yeni Kategori Ekle</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/categories/add}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Kategori Adı</label>
                        <input type="text" name="name" class="form-control" required placeholder="Spor, Teknoloji...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Slug</label>
                        <input type="text" name="slug" class="form-control" required placeholder="spor, teknoloji...">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">← Geri Dön</a>
                        <button type="submit" class="btn btn-primary">Kaydet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
