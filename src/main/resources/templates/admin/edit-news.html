<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Haber Düzenle</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 10px;
            display: none; /* Boşken görünmesin */
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">Haberi Düzenle / Yeni Haber</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/news/save}" th:object="${news}" method="post">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Haber Başlığı</label>
                        <input type="text" th:field="*{title}" class="form-control" required placeholder="Başlığı buraya yazın...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Yazar</label>
                        <input type="text" th:field="*{author}" class="form-control" placeholder="Admin veya İsminiz">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Haber Görseli (URL)</label>
                        <input type="text" th:field="*{imageUrl}" id="imageUrlInput"
                               class="form-control" placeholder="https://resim-linki.com/haber.jpg">
                        <div class="form-text text-muted">İnternetten kopyaladığınız resim adresini buraya yapıştırın.</div>
                        
                        <img id="previewImg" th:src="*{imageUrl}" class="image-preview" 
                             th:style="*{imageUrl != null} ? 'display:block' : 'display:none'">
                    </div>
					<div class="mb-3">
					    <label class="form-label fw-bold">Kategori</label>
					    <select name="categoryId" class="form-select">
					        <option value="">-- Kategori Seç --</option>
					        <option th:each="cat : ${categories}"
					                th:value="${cat.id}"
					                th:text="${cat.name}"
					                th:selected="${news.category != null && news.category.id == cat.id}">
					        </option>
					    </select>
					</div>
					<div class="mb-3">
					    <label class="form-label fw-bold">Etiketler</label>
					    <div class="d-flex flex-wrap gap-2">
					        <div th:each="tag : ${tags}" class="form-check">
					            <input type="checkbox" 
					                   class="form-check-input"
					                   name="tagIds" 
					                   th:value="${tag.id}"
					                   th:checked="${news.tags != null && news.tags.contains(tag)}">
					            <label class="form-check-label" th:text="${tag.name}"></label>
					        </div>
					    </div>
					</div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Haber İçeriği</label>
                        <textarea th:field="*{content}" class="form-control" rows="10" required placeholder="Haber metnini buraya girin..."></textarea>
                    </div>

                    <div class="d-flex justify-content-between border-top pt-3">
                        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">← Geri Dön</a>
                        <button type="submit" class="btn btn-success px-4">Haberi Kaydet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('imageUrlInput');
        const preview = document.getElementById('previewImg');
        
        input.addEventListener('input', function() {
            if (this.value) {
                preview.src = this.value;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });
    </script>
</body>
</html>
