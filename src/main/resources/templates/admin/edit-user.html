<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kullanıcı Düzenle</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">Kullanıcı Bilgilerini Güncelle</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/users/update/{id}(id=${user.id})}" method="post">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ad</label>
                            <input type="text" name="firstName" th:value="${user.firstName}" class="form-control" placeholder="Ad giriniz">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Soyad</label>
                            <input type="text" name="lastName" th:value="${user.lastName}" class="form-control" placeholder="Soyad giriniz">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Kullanıcı Adı</label>
                        <input type="text" name="username" th:value="${user.username}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-posta Adresi</label>
                        <input type="email" name="email" th:value="${user.email}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="enabled" id="enabledSwitch" th:checked="${user.enabled}">
                            <label class="form-check-label" for="enabledSwitch">Hesap Aktif (Giriş Yapabilir)</label>
                        </div>
                    </div>
					<div class="mb-3">
					    <label class="form-label fw-bold">Roller</label>
					    <div>
					        <div th:each="role : ${allRoles}" class="form-check">
					            <input class="form-check-input" type="checkbox" 
					                   name="roleIds" 
					                   th:value="${role.id}"
					                   th:id="${'role_' + role.id}"
					                   th:checked="${user.roles.contains(role)}">
					            <label class="form-check-label" th:for="${'role_' + role.id}" th:text="${role.name}"></label>
					        </div>
					    </div>
					</div>

                    <hr>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">İptal</a>
                        <button type="submit" class="btn btn-primary">Bilgileri Güncelle</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
