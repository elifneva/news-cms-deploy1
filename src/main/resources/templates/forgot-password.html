<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Şifremi Unuttum - özavsrNews</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 24px 0; color: #333; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 10px; background: #1890ff; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        button:hover { background: #096dd9; }
        .message { background: #f6ffed; border: 1px solid #b7eb8f; color: #389e0d; padding: 10px; border-radius: 4px; margin-bottom: 16px; text-align: center; }
        .error { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; padding: 10px; border-radius: 4px; margin-bottom: 16px; text-align: center; }
        .back { text-align: center; margin-top: 16px; }
        .back a { color: #1890ff; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>Şifremi Unuttum</h2>
    <div th:if="${message}" class="message" th:text="${message}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>
    <form method="post" th:action="@{/forgot-password}">
        <input type="email" name="email" placeholder="Email adresiniz" required/>
        <button type="submit">Sıfırlama Linki Gönder</button>
    </form>
    <div class="back"><a th:href="@{/login}">← Giriş sayfasına dön</a></div>
</div>
</body>
</html>
