<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Şifre Sıfırla - News CMS</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 24px 0; color: #333; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #1890ff; outline: none; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        button { width: 100%; padding: 12px; background: #1890ff; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #096dd9; }
        .error { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; padding: 10px; border-radius: 4px; margin-bottom: 16px; text-align: center; font-size: 14px; }
        .success { background: #f6ffed; border: 1px solid #b7eb8f; color: #389e0d; padding: 10px; border-radius: 4px; margin-bottom: 16px; text-align: center; font-size: 14px; }
        .back { text-align: center; margin-top: 16px; font-size: 14px; }
        .back a { color: #1890ff; text-decoration: none; }
        .back a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h2>Yeni Şifre Belirle</h2>
    
    <div th:if="${error}" class="error" th:text="${error}"></div>
    
    <div th:if="${message}" class="success" th:text="${message}"></div>

    <form method="post" th:action="@{/reset-password}">
        <input type="hidden" name="token" th:value="${token}"/>
        
        <input type="password" name="password" placeholder="Yeni şifre" required minlength="6"/>
        <input type="password" name="confirmPassword" placeholder="Yeni şifreyi tekrar girin" required minlength="6"/>
        
        <button type="submit">Şifremi Güncelle</button>
    </form>
    
    <div class="back">
        <a th:href="@{/login}">← Giriş sayfasına dön</a>
    </div>
</div>
</body>
</html>
